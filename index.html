<!DOCTYPE html>
<html>
<head>
    <title>Epstein Clicker</title>
    <style>
        body { 
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #37474f 0%, #102027 100%);
            color: white;
            overflow: hidden;
        }

        #shop {
            width: 320px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-right: 3px solid #64b5f6;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Image Styling */
        #target-image {
            width: 400px; /* Bigger as requested */
            height: auto;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s;
            border: 5px solid #64b5f6;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(100, 181, 246, 0.4);
        }

        #target-image:active { transform: scale(0.95); }
        #target-image:hover { transform: scale(1.02); }

        .stats-panel { text-align: center; margin-bottom: 20px; }
        .count-text { font-size: 52px; font-weight: bold; color: #64b5f6; text-shadow: 2px 2px #000; }
        
        button {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background: #64b5f6;
            color: #0d47a1;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover:not(:disabled) { background: #90caf9; transform: translateY(-2px); }
        button:disabled { background: #455a64; cursor: not-allowed; color: #90a4ae; }
        .upgrade-info { font-size: 13px; margin-top: 4px; color: #bbdefb; }
    </style>
</head>
<body>

    <div id="shop">
        <h2 style="color: #64b5f6; text-align: center;">Legal & Influence Shop</h2>
        <hr style="width: 100%; border: 1px solid #455a64;">
        
        <div>
            <button id="clickBtn" onclick="buyClickUpgrade()">⚖️ Hire Lawyer (Cost: 10)</button>
            <div class="upgrade-info">+1 Click Power</div>
        </div>

        <div>
            <button id="autoBtn" onclick="buyAutoUpgrade()">🚁 Private Pilot (Cost: 50)</button>
            <div class="upgrade-info">+1 Click Per Second (CPS)</div>
        </div>
        
        <div style="margin-top: auto; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 5px;">
            <div>Power: <span id="power">1</span></div>
            <div>CPS: <span id="cps">0</span></div>
        </div>
    </div>

    <div id="game-area">
        <div class="stats-panel">
            <div class="count-text"><span id="count">0</span></div>
            <div style="font-size: 18px; opacity: 0.8;">Files Collected</div>
        </div>

        <!-- Image of Jeffrey Epstein -->
        <img id="target-image" 
             src="https://upload.wikimedia.org" 
             alt="Target"
             onclick="handleClick()">
    </div>

    <script>
        let score = 0;
        let clickPower = 1;
        let autoPower = 0;
        let clickCost = 10;
        let autoCost = 50;

        function updateDisplay() {
            document.getElementById('count').innerText = Math.floor(score);
            document.getElementById('power').innerText = clickPower;
            document.getElementById('cps').innerText = autoPower;
            
            const clickBtn = document.getElementById('clickBtn');
            clickBtn.innerText = `⚖️ Hire Lawyer (Cost: ${clickCost})`;
            clickBtn.disabled = score < clickCost;

            const autoBtn = document.getElementById('autoBtn');
            autoBtn.innerText = `🚁 Private Pilot (Cost: ${autoCost})`;
            autoBtn.disabled = score < autoCost;
        }

        function handleClick() {
            score += clickPower;
            updateDisplay();
        }

        function buyClickUpgrade() {
            if (score >= clickCost) {
                score -= clickCost;
                clickPower += 1;
                clickCost = Math.ceil(clickCost * 1.6);
                updateDisplay();
            }
        }

        function buyAutoUpgrade() {
            if (score >= autoCost) {
                score -= autoCost;
                autoPower += 1;
                autoCost = Math.ceil(autoCost * 1.8);
                updateDisplay();
            }
        }

        // CPS Loop
        setInterval(() => {
            if (autoPower > 0) {
                score += autoPower;
                updateDisplay();
            }
        }, 1000);

        updateDisplay();
    </script>
</body>
</html>
