<!DOCTYPE html>
<html>
<head>
    <title>Banana Clicker Extreme</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #fff9c4; padding-top: 50px; }
        #banana { width: 200px; cursor: pointer; transition: transform 0.1s; user-select: none; }
        #banana:active { transform: scale(0.9); }
        .stats { font-size: 24px; font-weight: bold; margin: 20px; }
        .shop { margin-top: 30px; display: inline-block; text-align: left; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 10px; margin: 5px; cursor: pointer; background: #fbc02d; border: none; border-radius: 5px; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="stats">Bananas: <span id="count">0</span></div>
    
    <!-- Clickable Banana -->
    <div id="banana" onclick="clickBanana()">🍌</div>

    <div class="shop">
        <h3>Banana Shop</h3>
        <p>Current Click Power: +<span id="power">1</span></p>
        <button id="upgradeBtn" onclick="buyUpgrade()">Buy Monkey (Cost: 10)</button>
        <p><small>Monkeys increase your clicking power!</small></p>
    </div>

    <script>
        let bananas = 0;
        let clickPower = 1;
        let upgradeCost = 10;

        function updateDisplay() {
            document.getElementById('count').innerText = Math.floor(bananas);
            document.getElementById('power').innerText = clickPower;
            document.getElementById('upgradeBtn').innerText = `Buy Monkey (Cost: ${upgradeCost})`;
            document.getElementById('upgradeBtn').disabled = bananas < upgradeCost;
        }

        function clickBanana() {
            bananas += clickPower;
            updateDisplay();
        }

        function buyUpgrade() {
            if (bananas >= upgradeCost) {
                bananas -= upgradeCost;
                clickPower++;
                upgradeCost = Math.ceil(upgradeCost * 1.5); // Cost increases
                updateDisplay();
            }
        }
    </script>
</body>
</html>
