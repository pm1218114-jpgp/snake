<!DOCTYPE html>
<html>
<head>
    <title>Monkey Clicker Deluxe</title>
    <style>
        body { 
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #795548 0%, #3e2723 100%);
            color: white;
            overflow: hidden;
        }

        /* Sidebar Shop */
        #shop {
            width: 300px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-right: 3px solid #fbc02d;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Game Area */
        #game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #monkey {
            font-size: 250px; /* Big Monkey */
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        #monkey:active { transform: scale(0.9); }
        #monkey:hover { transform: scale(1.05); }

        .stats-panel {
            text-align: center;
            margin-bottom: 20px;
        }

        .count-text { font-size: 48px; font-weight: bold; color: #fbc02d; text-shadow: 2px 2px #000; }
        .sub-text { font-size: 18px; opacity: 0.9; }

        button {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background: #fbc02d;
            color: #3e2723;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover:not(:disabled) { background: #fff176; transform: translateY(-2px); }
        button:disabled { background: #6d6d6d; cursor: not-allowed; color: #9e9e9e; }
        
        .upgrade-info { font-size: 12px; margin-top: 5px; color: #ffecb3; }
    </style>
</head>
<body>

    <!-- Sidebar Shop -->
    <div id="shop">
        <h2 style="color: #fbc02d; text-align: center;">Jungle Shop</h2>
        <hr style="width: 100%; border: 1px solid #5d4037;">
        
        <div>
            <button id="clickBtn" onclick="buyClickUpgrade()">💪 Buy Training (Cost: 10)</button>
            <div class="upgrade-info">+1 Click Power</div>
        </div>

        <div>
            <button id="autoBtn" onclick="buyAutoUpgrade()">🤖 Buy Robot Monkey (Cost: 50)</button>
            <div class="upgrade-info">+1 Click Per Second (CPS)</div>
        </div>
        
        <div style="margin-top: auto; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 5px;">
            <div>Click Power: <span id="power">1</span></div>
            <div>CPS: <span id="cps">0</span></div>
        </div>
    </div>

    <!-- Main Game Area -->
    <div id="game-area">
        <div class="stats-panel">
            <div class="count-text"><span id="count">0</span> 🍌</div>
            <div class="sub-text">Bananas Collected</div>
        </div>

        <div id="monkey" onclick="clickMonkey()">🐒</div>
    </div>

    <script>
        let bananas = 0;
        let clickPower = 1;
        let autoPower = 0;
        let clickCost = 10;
        let autoCost = 50;

        function updateDisplay() {
            document.getElementById('count').innerText = Math.floor(bananas);
            document.getElementById('power').innerText = clickPower;
            document.getElementById('cps').innerText = autoPower;
            
            // Update Click Upgrade Button
            const clickBtn = document.getElementById('clickBtn');
            clickBtn.innerText = `💪 Buy Training (Cost: ${clickCost})`;
            clickBtn.disabled = bananas < clickCost;

            // Update Auto Upgrade Button
            const autoBtn = document.getElementById('autoBtn');
            autoBtn.innerText = `🤖 Buy Robot (Cost: ${autoCost})`;
            autoBtn.disabled = bananas < autoCost;
        }

        function clickMonkey() {
            bananas += clickPower;
            updateDisplay();
        }

        function buyClickUpgrade() {
            if (bananas >= clickCost) {
                bananas -= clickCost;
                clickPower += 1;
                clickCost = Math.ceil(clickCost * 1.6);
                updateDisplay();
            }
        }

        function buyAutoUpgrade() {
            if (bananas >= autoCost) {
                bananas -= autoCost;
                autoPower += 1;
                autoCost = Math.ceil(autoCost * 1.8);
                updateDisplay();
            }
        }

        // Auto-Clicker Loop (runs every second)
        setInterval(() => {
            if (autoPower > 0) {
                bananas += autoPower;
                updateDisplay();
            }
        }, 1000);

        // Initial update
        updateDisplay();
    </script>
</body>
</html>
